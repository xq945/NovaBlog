# 1. 服务端口
server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

# 2. Spring 核心配置
spring:
  # 激活开发环境
  profiles:
    active: dev
  # JSON 时间格式化（全局统一）
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
  # 文件上传限制
  # max-file-size: 单文件最大 5MB（后端代码中同步校验）
  # max-request-size: 整个请求最大 10MB，需大于 max-file-size 以容纳 multipart 边界等开销
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

  # 强制启用 ANSI 颜色输出（Windows cmd 下日志显示彩色）
  output:
    ansi:
      enabled: always

  # 3. 数据库配置（MySQL8 + Hikari 连接池）
  datasource:
    driver-class-name: ${MYSQL_DRIVER}
    url: ${MYSQL_URL}
    username: ${MYSQL_USERNAME}
    password: ${MYSQL_PASSWORD}
    # Hikari 连接池（高性能，SpringBoot 默认）
    hikari:
      minimum-idle: 5           # 最小空闲连接
      maximum-pool-size: 20     # 最大连接数
      idle-timeout: 300000      # 空闲超时 5 分钟
      max-lifetime: 1800000     # 连接最大生命周期 30 分钟
      connection-timeout: 30000 # 连接超时 30 秒
      pool-name: NovaBlogHikariCP

  # 4. Redis 配置（缓存、登录状态）
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      database: ${REDIS_DATABASE}
      timeout: 3000ms
      # 连接池
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: 1000ms

# 5. MyBatis 配置
mybatis:
  mapper-locations: classpath:mapper/*.xml       # mapper XML 文件路径
  type-aliases-package: com.novablog.entity      # 实体类别名包
  configuration:
    map-underscore-to-camel-case: true           # 下划线自动转驼峰（关键！）
    # log-impl 在 application-dev.yml 中配置，开发环境输出 SQL，生产环境关闭

# 6. JWT 登录认证配置
jwt:
  secret: ${NOVABLOG_JWT_SECRET}
  expiration: 7200000            # Token 过期时间：2 小时
  refresh-expiration: 604800000   # 刷新 Token：7 天

# 7. 日志配置
logging:
  level:
    com.novablog.mapper: debug  # 打印 Mapper SQL

# 8. 阿里云OSS配置
aliyun:
  oss:
    endpoint: ${ALIYUN_OSS_ENDPOINT}          # OSS服务端点，如 oss-cn-beijing.aliyuncs.com
    bucket: ${ALIYUN_OSS_BUCKET}              # Bucket名称
    access-key-id: ${ALIYUN_OSS_ACCESS_KEY_ID}      # RAM用户AccessKey ID
    access-key-secret: ${ALIYUN_OSS_ACCESS_KEY_SECRET}  # RAM用户AccessKey Secret

# 9. AI/RAG 配置（基于 Spring AI 框架）
# 对话模型和嵌入模型由 AiModelConfig 根据 ai.chat.provider / ai.embedding.provider 动态装配
# 支持：deepseek（OpenAI 兼容）、openai、bailian（阿里云百炼/通义）
# 注意：DeepSeek 目前仅支持 /chat/completions，不支持 /embeddings
# 若使用 DeepSeek 作为对话模型，建议将 embedding.provider 配置为 openai 或 bailian 并提供对应 API Key
ai:
  enabled: ${AI_ENABLED:true}                 # 是否启用 AI 功能
  chat:
    provider: ${AI_CHAT_PROVIDER:deepseek}    # 对话模型提供商：deepseek / openai / bailian
    deepseek:
      base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
      api-key: ${DEEPSEEK_API_KEY}            # DeepSeek API Key
      model: ${DEEPSEEK_CHAT_MODEL:deepseek-chat}
      temperature: ${DEEPSEEK_CHAT_TEMPERATURE:0.7}
      max-tokens: ${DEEPSEEK_CHAT_MAX_TOKENS:1024}
    openai:
      base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
      api-key: ${OPENAI_API_KEY}              # OpenAI API Key
      model: ${OPENAI_CHAT_MODEL:gpt-4o-mini}
      temperature: ${OPENAI_CHAT_TEMPERATURE:0.7}
      max-tokens: ${OPENAI_CHAT_MAX_TOKENS:1024}
    bailian:
      base-url: ${BAILIAN_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
      api-key: ${BAILIAN_API_KEY}             # 阿里云百炼 API Key
      model: ${BAILIAN_CHAT_MODEL:qwen-plus}
      temperature: ${BAILIAN_CHAT_TEMPERATURE:0.7}
      max-tokens: ${BAILIAN_CHAT_MAX_TOKENS:1024}
  embedding:
    provider: ${AI_EMBEDDING_PROVIDER:openai} # 嵌入模型提供商：deepseek / openai / bailian
    deepseek:
      base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
      api-key: ${DEEPSEEK_API_KEY}
      model: ${DEEPSEEK_EMBEDDING_MODEL:deepseek-embedding}
    openai:
      base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
      api-key: ${OPENAI_API_KEY}
      model: ${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}
    bailian:
      base-url: ${BAILIAN_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
      api-key: ${BAILIAN_API_KEY}
      model: ${BAILIAN_EMBEDDING_MODEL:text-embedding-v3}
  rag:
    top-k: ${RAG_TOP_K:5}                     # 检索片段数量
    chunk-size: ${RAG_CHUNK_SIZE:500}         # 分块目标 token 数
    chunk-overlap: ${RAG_CHUNK_OVERLAP:100}   # 分块重叠 token 数
    max-context-tokens: ${RAG_MAX_CONTEXT_TOKENS:3000}  # 传给模型的最大上下文 token 数
    rate-limit-per-minute: ${RAG_RATE_LIMIT:10} # 每 IP 每分钟请求次数